trigger:
- main

variables:
- template: ./SizeBench-Variables.yml

pool:
  name: Azure Pipelines
  vmImage: 'windows-2025-vs2026'
  
name: 'SizeBench_$(versionMajor).$(pipelineYearMonth).$(pipelineDay)_$(revision)'

jobs:
  - template: ./SizeBench-BuildAndTest-Job.yml
    parameters:
      packageMSIX: true
      publishNugets: false